<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Jolly Phone — Your Calls</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:            #000000;
    --panel:         #0e0d0c;
    --panel-hi:      #16130f;
    --line:          rgba(245,130,43,0.14);
    --line-soft:     rgba(255,255,255,0.06);
    --copper:        #f5822b;
    --copper-lite:   #ffb066;
    --copper-deep:   #b5541a;
    --text:          #f4efe9;
    --muted:         #8f867d;
    --muted-dim:     #5f584f;
    --urgent:        #ff3b30;
    --urgent-glow:   rgba(255,59,48,0.22);
    --ok:            #5ec99a;
    --display: 'Oxanium', system-ui, sans-serif;
    --body: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* faint copper aurora up top, nothing loud */
  body::before {
    content: "";
    position: fixed;
    inset: -20% -20% auto -20%;
    height: 480px;
    background: radial-gradient(60% 100% at 50% 0%, rgba(245,130,43,0.10), rgba(245,130,43,0) 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ---------- nav ---------- */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 22px 0 18px;
    flex-wrap: wrap;
  }

  .brand {
    font-family: var(--display);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #ffd9b3 0%, var(--copper) 55%, var(--copper-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    user-select: none;
  }

  .nav-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

  .live {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--copper-lite);
    text-transform: uppercase;
  }
  .live .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--copper);
    box-shadow: 0 0 0 0 rgba(245,130,43,0.55);
    animation: pulse 2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(245,130,43,0.55); }
    70%  { box-shadow: 0 0 0 9px rgba(245,130,43,0); }
    100% { box-shadow: 0 0 0 0 rgba(245,130,43,0); }
  }

  /* industry switcher */
  .switch {
    display: inline-flex;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .switch button {
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    color: var(--muted);
    background: none;
    border: 0;
    padding: 7px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: color .2s ease, background .2s ease;
    white-space: nowrap;
  }
  .switch button:hover { color: var(--text); }
  .switch button.active {
    color: #1a0f06;
    background: linear-gradient(180deg, var(--copper-lite), var(--copper));
  }
  .switch button:focus-visible { outline: 2px solid var(--copper-lite); outline-offset: 2px; }

  /* ---------- context bar ---------- */
  .context {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    padding: 10px 0 22px;
    border-bottom: 1px solid var(--line-soft);
    flex-wrap: wrap;
  }
  .biz h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 0.01em;
    line-height: 1.1;
  }
  .biz p {
    color: var(--muted-dim);
    font-size: 12.5px;
    margin-top: 5px;
    letter-spacing: 0.01em;
  }

  .stats { display: flex; gap: 26px; }
  .stat { text-align: right; }
  .stat .n {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    background: linear-gradient(180deg, #ffd9b3, var(--copper));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat .l {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted-dim);
    margin-top: 6px;
  }

  /* ---------- feed ---------- */
  .feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 22px;
  }

  .card {
    position: relative;
    display: flex;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: 16px;
    padding: 16px 18px 16px 16px;
    overflow: hidden;
    animation: slideIn .55s cubic-bezier(.16,.84,.44,1) both;
  }
  .card.enter-glow::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 16px;
    box-shadow: inset 0 0 0 1px var(--copper), 0 0 26px rgba(245,130,43,0.28);
    animation: glowOut 1.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-16px) scale(.985); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes glowOut { from { opacity: 1; } to { opacity: 0; } }
  .card.leaving { animation: fadeOut .45s ease forwards; }
  @keyframes fadeOut { to { opacity: 0; transform: translateY(6px); } }

  .rail {
    flex: 0 0 3px;
    align-self: stretch;
    border-radius: 3px;
    background: linear-gradient(180deg, var(--copper-lite), var(--copper-deep));
  }
  .card.urgent { border-color: rgba(255,59,48,0.35); background: linear-gradient(180deg, rgba(255,59,48,0.06), var(--panel) 60%); }
  .card.urgent .rail { background: linear-gradient(180deg, #ff6b62, var(--urgent)); }

  .body { flex: 1 1 auto; min-width: 0; }

  .row1 {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 3px;
  }
  .caller {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .time {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--muted-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .num {
    font-size: 12.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
    margin-bottom: 9px;
  }
  .reason {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 11px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .chip {
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--copper-lite);
    background: rgba(245,130,43,0.10);
    border: 1px solid var(--line);
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ok);
  }
  .status svg { width: 13px; height: 13px; }
  .card.urgent .status { color: var(--urgent); }

  .badge-urgent {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: #fff;
    background: var(--urgent);
    padding: 3px 8px;
    border-radius: 6px;
    box-shadow: 0 0 16px var(--urgent-glow);
  }

  footer {
    text-align: center;
    color: var(--muted-dim);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding-top: 34px;
  }
  footer b {
    font-family: var(--display);
    font-weight: 700;
    color: var(--muted);
  }

  @media (max-width: 560px) {
    .context { align-items: flex-start; }
    .stats { gap: 20px; }
    .biz h1 { font-size: 22px; }
    .nav-right { width: 100%; justify-content: space-between; }
    .switch { overflow-x: auto; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .card.enter-glow::after, .card.leaving, .live .dot { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="brand">JOLLYPHONE</div>
      <div class="nav-right">
        <span class="live"><span class="dot"></span> Live</span>
        <div class="switch" id="switch" role="tablist" aria-label="Business type">
          <button class="active" data-key="restaurant" role="tab">Restaurant</button>
          <button data-key="dental" role="tab">Dental</button>
          <button data-key="contractor" role="tab">Contractor</button>
          <button data-key="salon" role="tab">Salon</button>
        </div>
      </div>
    </nav>

    <div class="context">
      <div class="biz">
        <h1 id="bizName">Bella Vita Ristorante</h1>
        <p id="bizTag">Every call answered — summaries land the second the caller hangs up.</p>
      </div>
      <div class="stats">
        <div class="stat"><div class="n" id="statToday">0</div><div class="l">Calls today</div></div>
        <div class="stat"><div class="n">100%</div><div class="l">Answered</div></div>
        <div class="stat"><div class="n">0</div><div class="l">Missed</div></div>
      </div>
    </div>

    <div class="feed" id="feed" aria-live="polite" aria-label="Incoming call notifications"></div>

    <footer>Powered by <b>Jolly Phone</b> · answering every call, in every language</footer>
  </div>

<script>
(function () {
  "use strict";

  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var INDUSTRIES = {
    restaurant: {
      name: "Bella Vita Ristorante",
      tag: "Every call answered — reservations land the second the caller hangs up.",
      calls: [
        { name: "Marcus Halloway", reason: "Booking a table for their anniversary dinner.", chips: ["Party of 2", "Fri 7:30 PM"] },
        { name: "Priya Venkatesh", reason: "Asked if the kitchen can do a nut-free tasting menu.", chips: ["Party of 4", "Sat 8:00 PM", "Allergy noted"] },
        { name: "Dana Kowalski", reason: "Wanted to know tonight's kitchen closing time.", chips: ["Hours"] },
        { name: "Ben Ortiz", reason: "Catering quote for an office lunch next week.", chips: ["Catering", "~30 people"] },
        { name: "Sofia Marchetti", reason: "Changing a reservation from 4 to 6 guests.", chips: ["Party of 6", "Sun 6:30 PM"] },
        { name: "The Ellis Party", reason: "Large same-night party looking for a table now.", chips: ["Party of 12", "Tonight"], urgent: true },
        { name: "Grace Liu", reason: "Booking a birthday dinner, asked about a cake.", chips: ["Party of 8", "Thu 7:00 PM"] },
        { name: "Tomás Rivera", reason: "Reserved a quiet corner table for a work dinner.", chips: ["Party of 3", "Wed 7:15 PM"] }
      ]
    },
    dental: {
      name: "Brightleaf Dental",
      tag: "Every call answered — new-patient details reach the front desk instantly.",
      calls: [
        { name: "Angela Foster", reason: "New patient booking a first cleaning and exam.", chips: ["New patient", "Cleaning"] },
        { name: "Reggie Nauta", reason: "Severe toothache, hoping to be seen today.", chips: ["Emergency", "Same-day"], urgent: true },
        { name: "Meredith Cho", reason: "Rescheduling a crown fitting to next week.", chips: ["Reschedule", "Crown"] },
        { name: "Owen Delgado", reason: "Checking whether the office takes their insurance.", chips: ["Insurance"] },
        { name: "Fatima Nasser", reason: "Booking cleanings for two kids after school.", chips: ["Family", "2 patients"] },
        { name: "Craig Whitman", reason: "Following up on a whitening consult quote.", chips: ["Whitening", "Consult"] },
        { name: "Leah Sørensen", reason: "New patient with a chipped front tooth.", chips: ["New patient", "This week"] },
        { name: "Devon Pryce", reason: "Confirming tomorrow's 9 AM root canal.", chips: ["Confirm", "Thu 9:00 AM"] }
      ]
    },
    contractor: {
      name: "Sterling Home Builders",
      tag: "Every call answered — job details reach your crew before you're off the ladder.",
      calls: [
        { name: "Harold Beckman", reason: "Wants a quote for a full kitchen remodel.", chips: ["Estimate", "Kitchen"] },
        { name: "Renata Silva", reason: "Burst pipe under the sink, water everywhere.", chips: ["Emergency", "Water damage"], urgent: true },
        { name: "Jamal Curtis", reason: "Scheduling a deck rebuild walkthrough.", chips: ["Site visit", "Deck"] },
        { name: "Nina Abramowicz", reason: "Asked about lead time on bathroom tiling.", chips: ["Timeline", "Bathroom"] },
        { name: "Pete Donnelly", reason: "Following up on last week's roof estimate.", chips: ["Follow-up", "Roofing"] },
        { name: "Carol Vance", reason: "Booking a window replacement measure.", chips: ["Measure", "Windows"] },
        { name: "Isaac Brenner", reason: "New basement finishing project inquiry.", chips: ["Estimate", "Basement"] },
        { name: "Wendy Osei", reason: "Confirming Monday's drywall crew arrival.", chips: ["Confirm", "Mon 8:00 AM"] }
      ]
    },
    salon: {
      name: "Lumière Salon",
      tag: "Every call answered — bookings drop into your chair schedule automatically.",
      calls: [
        { name: "Chloe Bennett", reason: "Booking a cut and full balayage.", chips: ["Color", "Sat 11:00 AM"] },
        { name: "Andre Fontaine", reason: "Wants a men's cut before a wedding.", chips: ["Cut", "Fri PM"] },
        { name: "The Ramirez Bridal Party", reason: "Group booking for hair and makeup, wedding day.", chips: ["Bridal", "6 people"], urgent: true },
        { name: "Yuki Tanaka", reason: "Rescheduling a root touch-up to next Tuesday.", chips: ["Reschedule", "Color"] },
        { name: "Bianca Rossi", reason: "Asked which stylist does curly cuts.", chips: ["Stylist match"] },
        { name: "Naomi Clarke", reason: "First-time client booking a consult.", chips: ["New client", "Consult"] },
        { name: "Elise Moreau", reason: "Product question on the toner used last visit.", chips: ["Product"] },
        { name: "Josh Kaplan", reason: "Booking a beard trim and hot towel.", chips: ["Grooming", "Wed 5:30 PM"] }
      ]
    }
  };

  var feedEl = document.getElementById("feed");
  var bizNameEl = document.getElementById("bizName");
  var bizTagEl = document.getElementById("bizTag");
  var statTodayEl = document.getElementById("statToday");
  var switchEl = document.getElementById("switch");

  var current = "restaurant";
  var queueIndex = 0;
  var todayCount = 0;
  var sinceUrgent = 0;
  var timer = null;
  var MAX_CARDS = 7;

  var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';

  function randomPhone() {
    var mid = 200 + Math.floor(Math.random() * 700);
    var last = 1000 + Math.floor(Math.random() * 9000);
    return "(555) " + mid + "-" + last;
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var order = [];
  function nextCall() {
    if (queueIndex >= order.length) {
      order = shuffle(INDUSTRIES[current].calls);
      queueIndex = 0;
    }
    var call = order[queueIndex++];
    // don't let urgent calls cluster; skip if one landed very recently
    if (call.urgent && sinceUrgent < 4) {
      return nextCall();
    }
    return call;
  }

  function makeCard(call) {
    var card = document.createElement("div");
    card.className = "card" + (call.urgent ? " urgent" : "");
    if (!reduceMotion) card.classList.add("enter-glow");
    card.dataset.born = Date.now();

    var chips = call.chips.map(function (c) { return '<span class="chip">' + c + '</span>'; }).join("");

    var statusHtml = call.urgent
      ? '<span class="badge-urgent">URGENT</span><span class="status">Flagged · Alert sent</span>'
      : '<span class="status">' + CHECK + ' Answered · Summary sent</span>';

    card.innerHTML =
      '<div class="rail"></div>' +
      '<div class="body">' +
        '<div class="row1">' +
          '<span class="caller"></span>' +
          '<span class="time">Just now</span>' +
        '</div>' +
        '<div class="num">' + randomPhone() + '</div>' +
        '<div class="reason"></div>' +
        '<div class="chips">' + chips + '<span style="margin-left:auto"></span>' + statusHtml + '</div>' +
      '</div>';

    // textContent for names/reasons keeps it injection-safe
    card.querySelector(".caller").textContent = call.name;
    card.querySelector(".reason").textContent = call.reason;
    return card;
  }

  function addCall() {
    var call = nextCall();
    sinceUrgent = call.urgent ? 0 : sinceUrgent + 1;

    var card = makeCard(call);
    feedEl.insertBefore(card, feedEl.firstChild);

    todayCount++;
    statTodayEl.textContent = todayCount;

    // trim old cards
    while (feedEl.children.length > MAX_CARDS) {
      var last = feedEl.lastChild;
      last.classList.add("leaving");
      (function (node) {
        setTimeout(function () { if (node.parentNode) node.parentNode.removeChild(node); }, 450);
      })(last);
    }
  }

  function relTime(ms) {
    var s = Math.floor((Date.now() - ms) / 1000);
    if (s < 8) return "Just now";
    if (s < 60) return s + "s ago";
    var m = Math.floor(s / 60);
    if (m < 60) return m + " min ago";
    var h = Math.floor(m / 60);
    return h + "h ago";
  }

  function tickTimes() {
    var cards = feedEl.querySelectorAll(".card");
    for (var i = 0; i < cards.length; i++) {
      var t = cards[i].querySelector(".time");
      if (t) t.textContent = relTime(Number(cards[i].dataset.born));
    }
  }

  function scheduleNext() {
    // organic cadence: 5–9s between calls
    var delay = 5000 + Math.random() * 4000;
    timer = setTimeout(function () {
      if (!document.hidden) addCall();
      scheduleNext();
    }, delay);
  }

  function seed() {
    feedEl.innerHTML = "";
    order = shuffle(INDUSTRIES[current].calls);
    queueIndex = 0;
    todayCount = 0;
    sinceUrgent = 99;

    // preload 3 aged cards so it never looks empty
    var seedCount = 3;
    var ages = [140, 65, 12]; // seconds ago, newest last
    for (var i = 0; i < seedCount; i++) {
      var call = nextCall();
      sinceUrgent = call.urgent ? 0 : sinceUrgent + 1;
      var card = makeCard(call);
      card.classList.remove("enter-glow");
      card.style.animation = "none";
      card.dataset.born = Date.now() - ages[i] * 1000;
      feedEl.insertBefore(card, feedEl.firstChild);
      todayCount += 12 + Math.floor(Math.random() * 6); // believable running total
    }
    todayCount = 18 + Math.floor(Math.random() * 14);
    statTodayEl.textContent = todayCount;
    tickTimes();
  }

  function switchTo(key) {
    if (key === current) return;
    current = key;
    bizNameEl.textContent = INDUSTRIES[key].name;
    bizTagEl.textContent = INDUSTRIES[key].tag;
    seed();
  }

  switchEl.addEventListener("click", function (e) {
    var btn = e.target.closest("button");
    if (!btn) return;
    var buttons = switchEl.querySelectorAll("button");
    for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove("active");
    btn.classList.add("active");
    switchTo(btn.dataset.key);
  });

  // boot
  seed();
  scheduleNext();
  setInterval(tickTimes, 5000);
})();
</script>
</body>
</html>
